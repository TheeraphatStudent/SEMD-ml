project: malicious_url_detection

classes:
  - benign
  - malicious

classes_mapping:
  benign:
    - benign
    - legitimate
    - normal
  malicious:
    - malicious
    - malware
    - phishing
    - defacement
    - redirect
    - spam

feature_groups:
  # =========================================================================
  # URL LEVEL FEATURES (16 features)
  # =========================================================================
  url_level:
    description: "URL-level features - analyze basic structure and characters"
    features:
      - name: http_token
        type: binary
        description: "Uses HTTP instead of HTTPS (insecure)"
        priority: critical

      - name: url_length
        type: numeric
        description: "Total length of URL"

      - name: dot_count
        type: numeric
        description: "Number of dots (.) in URL"

      - name: hyphen_count
        type: numeric
        description: "Number of hyphens (-) in URL"

      - name: slash_count
        type: numeric
        description: "Number of slashes (/) in URL"

      - name: at_symbol_count
        type: numeric
        description: "Number of @ symbols in URL"
        priority: critical

      - name: percent_count
        type: numeric
        description: "Number of percent signs (%) in URL"

      - name: special_char_count
        type: numeric
        description: "Total special characters in URL"

      - name: digit_ratio
        type: ratio
        description: "Ratio of digits to total URL length"

      - name: letter_ratio
        type: ratio
        description: "Ratio of letters to total URL length"

      - name: special_char_ratio
        type: ratio
        description: "Ratio of special characters to total URL length"

      - name: longest_digit_sequence
        type: numeric
        description: "Length of longest consecutive digit sequence"

      - name: longest_letter_sequence
        type: numeric
        description: "Length of longest consecutive letter sequence"

      - name: longest_special_sequence
        type: numeric
        description: "Length of longest consecutive special character sequence"

      - name: character_continuity_rate
        type: ratio
        description: "Character type continuity rate (entropy proxy)"

      - name: url_entropy
        type: numeric
        description: "Shannon entropy of URL characters"

  # =========================================================================
  # URL LEVEL THRESHOLDS (5 features)
  # =========================================================================
  url_level_thresholds:
    description: "Threshold-based binary features derived from URL metrics"
    features:
      - name: low_entropy
        type: binary
        description: "Low entropy (<3.0) indicates simple/benign URL"

      - name: high_entropy
        type: binary
        description: "High entropy (>4.0) indicates random/obfuscated URL"

      - name: long_url_length
        type: binary
        description: "URL length >100 chars indicates obfuscation"
        priority: critical

      - name: high_digit_ratio
        type: binary
        description: "Digit ratio >30% indicates encoding/obfuscation"
        priority: critical

      - name: low_special_char_ratio
        type: binary
        description: "Special char ratio <5% indicates simple/benign URL"

  # =========================================================================
  # DOMAIN LEVEL FEATURES (22 features)
  # =========================================================================
  domain_level:
    description: "Domain-level features - analyze domain structure for spoofing detection"
    features:
      - name: domain_length
        type: numeric
        description: "Length of domain name (excluding protocol and path)"

      - name: domain_token_count
        type: numeric
        description: "Number of domain parts separated by dots"

      - name: subdomain_count
        type: numeric
        description: "Number of subdomains in URL"

      - name: digit_ratio_domain
        type: ratio
        description: "Ratio of digits to domain length"

      - name: hyphen_count_domain
        type: numeric
        description: "Number of hyphens (-) in domain"
        priority: critical

      - name: longest_domain_token
        type: numeric
        description: "Length of longest domain part"

      - name: avg_domain_token_length
        type: numeric
        description: "Average length of domain parts"

      - name: domain_entropy
        type: numeric
        description: "Shannon entropy of domain (measures randomness)"

      - name: ip_address_flag
        type: binary
        description: "Domain is an IP address instead of named domain"
        priority: critical

      - name: multiple_subdomain_flag
        type: binary
        description: "Has multiple subdomain levels (e.g., a.b.c.example.com)"
        priority: critical

      - name: brand_keyword_flag
        type: binary
        description: "Contains brand keywords in domain (e.g., paypal, google)"

      - name: port_in_url_flag
        type: binary
        description: "Has non-standard port in URL (e.g., :8080, :3000)"
        priority: critical

      - name: https_in_domain
        type: binary
        description: "Contains 'https' in domain name (deception technique)"

      - name: tld_suspicious_flag
        type: binary
        description: "Uses suspicious TLD (e.g., .tk, .ml, .ga, .cf, .gq)"
        priority: critical

      - name: shortening_service_flag
        type: binary
        description: "Is a URL shortener (e.g., bit.ly, tinyurl.com)"
        priority: critical

      - name: double_slash_redirecting
        type: binary
        description: "Has // in path (not after protocol) indicating redirect"

      - name: punycode_domain_flag
        type: binary
        description: "Domain uses Punycode (xn--) - possible homograph attack"
        priority: critical

      - name: unicode_domain_flag
        type: binary
        description: "Domain has Unicode/non-ASCII characters (IDN spoofing)"

      - name: homograph_suspicious_flag
        type: binary
        description: "Has similar-looking characters for deception (homograph attack)"

      - name: excessive_subdomain_depth
        type: numeric
        description: "Excessive subdomain depth (>4 levels indicates spam)"

      - name: random_string_domain_flag
        type: binary
        description: "Domain appears random/meaningless (high entropy, indicates DGA)"

      - name: free_hosting_domain_flag
        type: binary
        description: "Uses free hosting service (000webhost, freenom, etc.)"

      - name: dga_domain_flag
        type: binary
        description: "Domain likely from Domain Generation Algorithm (C&C)"
        priority: critical

      - name: non_standard_port_flag
        type: binary
        description: "Uses non-standard port (4444, 1337, 8080, 8888 - C&C)"

      - name: high_domain_entropy
        type: binary
        description: "Domain entropy >3.8 indicates random/obfuscated domain"
        priority: critical

  # =========================================================================
  # PATH LEVEL FEATURES (10 features)
  # =========================================================================
  path_level:
    description: "Path-level features - analyze path structure for malicious files"
    features:
      - name: path_length
        type: numeric
        description: "Length of path in URL (after domain)"

      - name: path_token_count
        type: numeric
        description: "Number of path segments separated by /"

      - name: digit_ratio_path
        type: ratio
        description: "Ratio of digits to path length"

      - name: dot_count_path
        type: numeric
        description: "Number of dots (.) in path"

      - name: longest_path_token
        type: numeric
        description: "Length of longest path segment"

      - name: avg_path_token_length
        type: numeric
        description: "Average length of path segments"

      - name: path_entropy
        type: numeric
        description: "Shannon entropy of path (measures randomness)"

      - name: filename_length
        type: numeric
        description: "Length of filename in path (last segment)"

      - name: suspicious_extension_flag
        type: binary
        description: "Has suspicious file extension (e.g., .exe, .bat, .scr, .vbs)"

      - name: executable_extension_flag
        type: binary
        description: "Has executable file extension"
        priority: critical

      - name: suspicious_js_extension_flag
        type: binary
        description: "Has .js file or javascript: protocol (Drive-by Download)"

  # =========================================================================
  # QUERY LEVEL FEATURES (10 features)
  # =========================================================================
  query_level:
    description: "Query string features - analyze parameters for attacks and redirects"
    features:
      - name: query_length
        type: numeric
        description: "Length of query string (after ?)"

      - name: parameter_count
        type: numeric
        description: "Number of parameters in query string"

      - name: digit_ratio_query
        type: ratio
        description: "Ratio of digits to query string length"

      - name: equal_count_query
        type: numeric
        description: "Number of equals signs (=) in query string"

      - name: ampersand_count_query
        type: numeric
        description: "Number of ampersands (&) in query string"

      - name: avg_parameter_length
        type: numeric
        description: "Average length of parameters in query string"

      - name: max_parameter_length
        type: numeric
        description: "Maximum length of parameter in query string"

      - name: query_entropy
        type: numeric
        description: "Shannon entropy of query string"

      - name: encoded_url_flag
        type: binary
        description: "Has URL encoding in query (e.g., %20, %3A)"
        priority: critical

      - name: redirect_parameter_flag
        type: binary
        description: "Has redirect parameter (url=, redirect=, next=, return=, goto=)"
        priority: critical

      - name: script_in_url_flag
        type: binary
        description: "Contains 'script' in URL or parameter (Drive-by Download)"
        priority: critical

      - name: auto_download_param_flag
        type: binary
        description: "Has auto-download parameter (download=, file=, get=)"

      - name: base64_in_url_flag
        type: binary
        description: "Has Base64 encoding in URL (C&C communication)"
        priority: critical

  # =========================================================================
  # PATTERN FEATURES (3 features)
  # =========================================================================
  pattern_features:
    description: "Pattern features - detect special patterns indicating malicious behavior"
    features:
      - name: mixed_token_flag
        type: binary
        description: "Has mixed letters and digits in same token"

      - name: hex_encoding_flag
        type: binary
        description: "Has hexadecimal encoding (e.g., %20, %3A, %2F)"
        priority: critical

      - name: obfuscation_pattern_flag
        type: binary
        description: "Has obfuscation patterns (e.g., abnormally long strings)"

class_feature_emphasis:
  benign:
    weight: 1.5
    strong_features:
      - low_entropy
      - low_special_char_ratio

  malicious:
    weight: 2.0
    strong_features:
      - http_token
      - ip_address_flag
      - executable_extension_flag
      - high_domain_entropy
      - high_digit_ratio
      - hex_encoding_flag
      - multiple_subdomain_flag
      - hyphen_count_domain
      - at_symbol_count
      - encoded_url_flag
      - redirect_parameter_flag
      - long_url_length
      - port_in_url_flag
      - shortening_service_flag
      - tld_suspicious_flag
      - punycode_domain_flag
      - dga_domain_flag
      - base64_in_url_flag
      - script_in_url_flag